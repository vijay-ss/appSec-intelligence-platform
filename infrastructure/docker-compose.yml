services:

  # ════════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    ports:
      - "9092:9092"
      - "8080:8080"
    command: >
      redpanda start
      --overprovisioned
      --smp 1
      --memory 512M
      --reserve-memory 0M
      --node-id 0
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/flink-checkpoints &&
      mc mb --ignore-existing local/appsec-audit-log &&
      mc mb --ignore-existing local/appsec-rag-corpus &&
      mc mb --ignore-existing local/appsec-backups &&
      echo 'MinIO buckets ready'
      "

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appsec
      POSTGRES_USER: appsec
      POSTGRES_PASSWORD: appsec
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appsec -d appsec"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.5.1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: curlimages/curl:8.10.1
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      echo 'Pulling qwen2.5-coder:7b-instruct-q4_K_M...' &&
      curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5-coder:7b-instruct-q4_K_M\"}' &&
      echo 'Pulling nomic-embed-text...' &&
      curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}' &&
      echo 'Ollama models ready'
      "

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus

  # ════════════════════════════════════════════════════════════════════════════
  # STREAM PROCESSING
  # ════════════════════════════════════════════════════════════════════════════

  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: appsec-flink:1.20
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      KAFKA_BROKERS: redpanda:9092
      POSTGRES_URL: postgresql://appsec:appsec@postgres:5432/appsec
    volumes:
      - ./flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./flink/log4j-console.properties:/opt/flink/conf/log4j-console.properties:ro
      - ../stream-processing:/opt/flink/userjobs:ro
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: appsec-flink:1.20
    command: taskmanager
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      KAFKA_BROKERS: redpanda:9092
      POSTGRES_URL: postgresql://appsec:appsec@postgres:5432/appsec
    volumes:
      - ./flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./flink/log4j-console.properties:/opt/flink/conf/log4j-console.properties:ro
      - ../stream-processing:/opt/flink/userjobs:ro
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  flink-job-submitter:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: appsec-flink:1.20
    command: >
      /bin/bash -c "
        until curl -sf http://flink-jobmanager:8081/overview; do
          echo 'Waiting for Flink jobmanager...' && sleep 3;
        done &&
        flink run
          --jobmanager flink-jobmanager:8081
          --python /opt/flink/userjobs/topology.py
          --pyFiles /opt/flink/userjobs
          -d &&
        echo 'Topology submitted'
      "
    volumes:
      - ../stream-processing:/opt/flink/userjobs:ro
    depends_on:
      flink-taskmanager:
        condition: service_started
    restart: on-failure

  # ════════════════════════════════════════════════════════════════════════════
  # INGESTION — Go pollers
  # All build from context: ../ingestion so they share go.mod and shared/
  # ════════════════════════════════════════════════════════════════════════════

  nvd-poller:
    build:
      context: ../ingestion
      dockerfile: nvd-poller/Dockerfile
    image: appsec-nvd-poller:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDIS_ADDR: redis:6379
      NVD_POLL_INTERVAL_SECONDS: "300"
      NVD_API_KEY: "${NVD_API_KEY:-}"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  osv-poller:
    build:
      context: ../ingestion
      dockerfile: osv-poller/Dockerfile
    image: appsec-osv-poller:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDIS_ADDR: redis:6379
      OSV_POLL_INTERVAL_SECONDS: "300"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  github-events-poller:
    build:
      context: ../ingestion
      dockerfile: github-events-poller/Dockerfile
    image: appsec-github-events-poller:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_POLL_INTERVAL_SECONDS: "60"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # archive-replayer is in the 'replay' profile — it is off by default.
  # Enable with: docker compose --profile replay up
  archive-replayer:
    build:
      context: ../ingestion
      dockerfile: archive-replayer/Dockerfile
    image: appsec-archive-replayer:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
    command: ["--start-date", "2024-01-01", "--end-date", "2025-01-01", "--mode", "continuous", "--delay-ms", "500"]
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["replay"]

  # ════════════════════════════════════════════════════════════════════════════
  # AI AGENTS
  # Build context is repo root so the Dockerfile can access shared/ and agents/
  # ════════════════════════════════════════════════════════════════════════════

  triage-agent:
    build:
      context: ..
      dockerfile: agents/Dockerfile
    image: appsec-triage-agent:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
      POSTGRES_URL: postgresql://appsec:appsec@postgres:5432/appsec
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen2.5-coder:7b-instruct-q4_K_M
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      # Swap to Anthropic with:
      # LLM_PROVIDER: anthropic
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  # MCP SERVER
  # ════════════════════════════════════════════════════════════════════════════

  mcp-server:
    build:
      context: ..
      dockerfile: mcp-server/Dockerfile
    image: appsec-mcp-server:latest
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql://appsec:appsec@postgres:5432/appsec
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  # SETUP JOBS
  # ════════════════════════════════════════════════════════════════════════════

  synthetic-generator:
    build:
      context: ../scripts/synthetic-generator
    image: appsec-synthetic-generator:latest
    ports:
      - "8090:8090"
    environment:
      KAFKA_BROKERS: redpanda:9092
      POSTGRES_URL: postgresql://appsec:appsec@postgres:5432/appsec
      HUM_RATE: "2.0"
      SEED_REGISTRY: "true"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # corpus-builder is in the 'setup' profile — run it once manually:
  # docker compose --profile setup run --rm corpus-builder
  corpus-builder:
    build:
      context: ..
      dockerfile: scripts/corpus-builder/Dockerfile
    image: appsec-corpus-builder:latest
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      CORPUS_DAYS: "7"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: on-failure
    profiles: ["setup"]

volumes:
  minio_data:
  qdrant_data:
  postgres_data:
  ollama_data:
  grafana_data:
