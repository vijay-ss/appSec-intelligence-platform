# Log4j2 configuration for Flink.
# Mounted into the container at /opt/flink/conf/log4j-console.properties
#
# Goal: suppress noisy framework logs so operator output is easy to read
# during local development. In production you'd ship these to a log aggregator.

# Root logger — INFO for everything not listed below
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# Console appender — plain text, not JSON (Flink's own format)
appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# ── Suppress chatty framework components ─────────────────────────────────────
logger.akka.name = akka
logger.akka.level = WARN

logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.flink_kafka.name = org.apache.flink.connector.kafka
logger.flink_kafka.level = WARN

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = ERROR

logger.rocksdb.name = org.rocksdb
logger.rocksdb.level = WARN

# ── Keep these visible ────────────────────────────────────────────────────────
# Checkpoint lifecycle — useful during development to confirm checkpoints
# are completing successfully.
logger.checkpoint.name = org.apache.flink.runtime.checkpoint
logger.checkpoint.level = INFO

# Job lifecycle — shows when the topology starts, operators register, etc.
logger.job.name = org.apache.flink.runtime.jobmaster
logger.job.level = INFO
